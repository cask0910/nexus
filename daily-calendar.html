    <!-- divider -->
    <div style="position:relative;height:1px;margin:18px 0 16px;background:linear-gradient(90deg,rgba(110,86,54,0),rgba(110,86,54,.32) 18%,rgba(110,86,54,.32) 82%,rgba(110,86,54,0));"></div>

    <!-- ===== 宜 / 忌 ===== -->

          <span style="width:30px;height:30px;border-radius:7px;background:#9a4b39;display:inline-flex;align-items:center;justify-content:center;font-size:19px;color:#f1e6d2;font-family:'LXGW WenKai TC','KaiTi','STKaiti',cursive;box-shadow:0 2px 5px rgba(110,52,36,.28);">宜</span>
